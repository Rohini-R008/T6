<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Mart Login</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
        <div class="container">

        <!-- Left Section -->
        <div class="left">
            <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
        </div>

        <!-- Right Section -->
        <div class="right">

            <div class="login-box">

                <h1>Hello Again!</h1>
                <p>Welcome back! we missed you!</p>

                <label>Email</label>
                <input type="email" placeholder="Emailid@site.com">

                <label>Password</label>
                <input type="password" placeholder="Password">

                <div class="forgot">Forgot Password</div>

                <button>Login</button>

                <p class="register">Not a member? <a href="#">Register Now</a></p>

            </div>

        </div>

    </div>
</body>
</html>
